<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>귤귤 일정관리</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html"><span class="brand-mark"></span><span class="brand-text" data-site-name>귤귤 일정관리</span></a>
      <div class="nav-actions" id="app-nav" hidden>
        <span class="pill orange" id="admin-name"></span>
        <button class="btn btn-secondary small" id="signout-btn" type="button">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="section auth-page" id="auth-section">
    <div class="container auth-container">
      <section class="auth-stack-card">
        <div class="auth-stack-header">
          <h1 class="auth-title">관리자 로그인</h1>
          <p class="auth-subtitle">관리자 ID와 비밀번호를 입력해주세요.</p>
        </div>
        <div id="login-message" class="status-bar hidden"></div>
        <form id="admin-login-form" class="stack auth-form">
          <div class="field"><label>아이디</label><input class="input" name="login" autocomplete="username" /></div>
          <div class="field"><label>비밀번호</label><input class="input" name="secret" type="password" autocomplete="current-password" /></div>
          <button class="btn btn-primary auth-submit" type="submit">로그인</button>
          <div class="auth-actions-grid">
            <button class="btn btn-secondary auth-alt" id="toggle-signup" type="button">가입하기</button>
            <button class="btn btn-secondary auth-alt" id="bootstrap-hint-btn" type="button">최초등록하기</button>
          </div>
        </form>
        <section id="signup-panel" hidden>
          <div class="auth-stack-divider"></div>
          <div class="auth-stack-header signup-head">
            <h2 class="auth-title sub">강사 admin 신청</h2>
          </div>
          <div id="signup-message" class="status-bar hidden"></div>
          <form id="admin-signup-form" class="stack auth-form">
            <div class="field"><label>이름</label><input class="input" name="full_name" /></div>
            <div class="field"><label>전화번호</label><input class="input" name="phone" inputmode="numeric" /></div>
            <div class="field"><label>담당 강의</label><select class="select" id="request-course-id" name="requested_course_id" required></select></div>
            <div class="field"><label>메모</label><textarea class="textarea compact" name="memo"></textarea></div>
            <div class="auth-actions-grid single">
              <button class="btn btn-primary auth-submit" type="submit">회원가입</button>
            </div>
          </form>
        </section>
      </section>
    </div>
  </main>

  <main class="section" id="app-main" hidden>
    <div class="container layout">
      <aside class="sidebar">
        <section class="menu-card">
          <div id="course-tabs" class="course-tabs"></div>
        </section>
      </aside>
      <section class="main">
        <div id="app-message" class="status-bar hidden"></div>
        <section id="stats" class="stat-grid"></section>
        <section id="overview-card"></section>

        <section class="card" id="super-course-create">
          <div class="card-header"><div><h3>강의 / 기수</h3></div></div>
          <form id="course-form" class="stack">
            <div class="inline-form">
              <div class="field"><label>강의명</label><input class="input" name="title" /></div>
              <div class="field"><label>강사명</label><input class="input" name="instructor_name" /></div>
              <div class="field"><label>기수</label><input class="input" name="cohort_label" /></div>
              <div class="field"><label>설명</label><input class="input" name="description" /></div>
            </div>
            <button class="btn btn-primary" type="submit">저장</button>
          </form>
          <div class="table-wrap" id="course-list-table"></div>
        </section>

        <section class="card">
          <div class="card-header"><div><h3>일정</h3></div></div>
          <form id="schedule-form" class="stack">
            <div class="inline-form">
              <div class="field"><label>제목</label><input class="input" name="title" /></div>
              <div class="field"><label>장소 / 링크</label><input class="input" name="location" /></div>
              <div class="field"><label>시작</label><input class="input" type="datetime-local" name="starts_at" /></div>
              <div class="field"><label>종료</label><input class="input" type="datetime-local" name="ends_at" /></div>
            </div>
            <div class="field"><label>설명</label><input class="input" name="description" /></div>
            <button class="btn btn-primary" type="submit">일정 저장</button>
          </form>
          <div class="grid" id="schedule-list"></div>
        </section>

        <section class="card">
          <div class="card-header"><div><h3>행사 신청서</h3></div></div>
          <form id="event-form" class="stack">
            <div class="inline-form">
              <div class="field"><label>행사명</label><input class="input" name="title" /></div>
              <div class="field"><label>행사 시작</label><input class="input" type="datetime-local" name="starts_at" /></div>
              <div class="field"><label>행사 종료</label><input class="input" type="datetime-local" name="ends_at" /></div>
              <div class="field"><label>전체 마감 수</label><input class="input" name="max_applicants" /></div>
            </div>
            <div class="inline-form">
              <div class="field"><label>신청 시작</label><input class="input" type="datetime-local" name="registration_open_at" /></div>
              <div class="field"><label>신청 마감</label><input class="input" type="datetime-local" name="registration_close_at" /></div>
              <div class="field" style="grid-column:span 2"><label>설명</label><input class="input" name="description" /></div>
            </div>
            <div class="row"><button class="btn btn-secondary small" id="add-question-btn" type="button">문항 추가</button></div>
            <div id="question-builder" class="form-builder"></div>
            <button class="btn btn-primary" type="submit">행사 저장</button>
          </form>
          <div class="grid" id="event-list"></div>
        </section>

        <section class="card">
          <div class="card-header"><div><h3>과제</h3></div></div>
          <form id="assignment-form" class="stack">
            <div class="inline-form">
              <div class="field"><label>주차</label><input class="input" name="week_no" /></div>
              <div class="field"><label>제목</label><input class="input" name="title" /></div>
              <div class="field"><label>마감</label><input class="input" type="datetime-local" name="due_at" /></div>
              <div class="field"><label>링크</label><input class="input" name="link_url" /></div>
            </div>
            <div class="field"><label>설명</label><input class="input" name="description" /></div>
            <button class="btn btn-primary" type="submit">과제 저장</button>
          </form>
          <div class="grid" id="assignment-list"></div>
        </section>

        <section class="card">
          <div class="card-header"><div><h3>회원가입 토큰</h3></div></div>
          <form id="token-form" class="stack">
            <div class="inline-form">
              <div class="field"><label>토큰명</label><input class="input" name="token_name" /></div>
              <div class="field"><label>토큰값</label><input class="input" name="token" /></div>
              <div class="field"><label>최대 인원</label><input class="input" name="max_uses" /></div>
              <div class="field"><label>만료</label><input class="input" type="datetime-local" name="expires_at" /></div>
            </div>
            <div class="field"><label>가입 안내</label><input class="input" name="welcome_message" /></div>
            <button class="btn btn-primary" type="submit">토큰 저장</button>
          </form>
          <div class="grid" id="token-list"></div>
        </section>

        <section class="card">
          <div class="card-header"><div><h3>회원 목록</h3></div></div>
          <form id="member-form" class="stack">
            <div class="inline-form inline-2">
              <div class="field"><label>이름</label><input class="input" name="full_name" /></div>
              <div class="field"><label>전화번호</label><input class="input" name="phone" /></div>
            </div>
            <button class="btn btn-primary" type="submit">회원 추가</button>
          </form>
          <div class="table-wrap" id="member-list-table"></div>
        </section>

        <section class="card" id="super-only" hidden>
          <div class="card-header"><div><h3>관리자 권한 / 신청</h3></div></div>
          <form id="role-form" class="stack">
            <div class="inline-form inline-3">
              <div class="field"><label>회원</label><select class="select" id="role-profile-id" name="profile_id"></select></div>
              <div class="field"><label>권한</label><select class="select" name="role_type"><option value="course_admin">강사 admin</option><option value="super_admin">슈퍼어드민</option></select></div>
              <div class="field"><label>강의</label><select class="select" id="role-course-id" name="course_id"></select></div>
            </div>
            <button class="btn btn-primary" type="submit">권한 부여</button>
          </form>
          <div class="table-wrap" id="request-list-table"></div>
          <div class="table-wrap" id="role-list-table"></div>
        </section>
      </section>
    </div>
  </main>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
